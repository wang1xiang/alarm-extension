<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alarm & Timer</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="../styles/common.css">
</head>
<body>
  <div class="container">
    <!-- Tab Navigation -->
    <nav class="tabs">
      <button class="tab-btn active" data-tab="alarms">Alarms</button>
      <button class="tab-btn" data-tab="timers">Timers</button>
      <button class="tab-btn" data-tab="settings">Settings</button>
    </nav>

    <!-- Alarms Panel -->
    <div id="alarms-panel" class="panel active">
      <div class="panel-header">
        <h2>Alarms</h2>
        <button id="add-alarm-btn" class="primary-btn">+</button>
      </div>
      <div id="alarm-list" class="alarm-list">
        <!-- Alarms will be rendered here -->
      </div>

      <!-- Add Alarm Form (hidden by default) -->
      <div id="add-alarm-form" class="form-modal hidden">
        <div class="form-modal-content">
          <h3>New Alarm</h3>
          <div class="form-group">
            <label for="alarm-time">Time</label>
            <input type="time" id="alarm-time" required>
          </div>
          <div class="form-group">
            <label for="alarm-label">Label</label>
            <input type="text" id="alarm-label" placeholder="Wake up">
          </div>
          <div class="form-group">
            <label>Repeat</label>
            <div class="day-selector">
              <button class="day-btn" data-day="0">S</button>
              <button class="day-btn" data-day="1">M</button>
              <button class="day-btn" data-day="2">T</button>
              <button class="day-btn" data-day="3">W</button>
              <button class="day-btn" data-day="4">T</button>
              <button class="day-btn" data-day="5">F</button>
              <button class="day-btn" data-day="6">S</button>
            </div>
          </div>
          <div class="form-actions">
            <button id="cancel-alarm-btn" class="secondary-btn">Cancel</button>
            <button id="save-alarm-btn" class="primary-btn">Save</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Timers Panel -->
    <div id="timers-panel" class="panel">
      <div class="panel-header">
        <h2>Timers</h2>
      </div>

      <!-- Quick Presets -->
      <div class="timer-presets">
        <button class="preset-btn" data-minutes="1">1 min</button>
        <button class="preset-btn" data-minutes="5">5 min</button>
        <button class="preset-btn" data-minutes="10">10 min</button>
        <button class="preset-btn" data-minutes="25">25 min</button>
      </div>

      <!-- Custom Timer Input -->
      <div class="custom-timer-input">
        <input type="number" id="timer-minutes" placeholder="Minutes" min="0" max="999">
        <input type="number" id="timer-seconds" placeholder="Seconds" min="0" max="59">
        <button id="start-custom-timer-btn" class="primary-btn">Start</button>
      </div>

      <!-- Active Timers List -->
      <div id="active-timers-list" class="timers-list">
        <!-- Active timers will be rendered here -->
      </div>
    </div>

    <!-- Settings Panel -->
    <div id="settings-panel" class="panel">
      <h2>Settings</h2>

      <div class="settings-group">
        <div class="setting-item">
          <label for="sound-select">Alert Sound</label>
          <select id="sound-select">
            <option value="default.mp3">Default</option>
            <option value="alarm1.mp3">Alarm 1</option>
            <option value="timer.mp3">Timer</option>
          </select>
        </div>

        <div class="setting-item">
          <label for="volume-slider">Volume</label>
          <input type="range" id="volume-slider" min="0" max="100" value="100">
        </div>

        <div class="setting-item">
          <label for="notifications-toggle">Enable Notifications</label>
          <input type="checkbox" id="notifications-toggle" checked>
        </div>

        <div class="setting-item">
          <button id="test-notification-btn" class="secondary-btn">Test Notification</button>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
