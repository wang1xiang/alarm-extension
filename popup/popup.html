<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber-Alarm & Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="../styles/common.css">
</head>
<body>
  <div class="scanline"></div>
  <div class="container">
    <!-- Tab Navigation -->
    <nav class="tabs">
      <button class="tab-btn active" data-tab="alarms">闹钟</button>
      <button class="tab-btn" data-tab="timers">倒计时</button>
      <button class="tab-btn" data-tab="settings">设置</button>
    </nav>

    <!-- Alarms Panel -->
    <div id="alarms-panel" class="panel active">
      <div class="panel-header">
        <h2>闹钟</h2>
        <button id="add-alarm-btn" class="primary-btn">+</button>
      </div>
      <div id="alarm-list" class="alarm-list">
        <!-- Alarms will be rendered here -->
      </div>

      <!-- Add Alarm Form (hidden by default) -->
      <div id="add-alarm-form" class="form-modal hidden">
        <div class="form-modal-content">
          <h3>新建闹钟</h3>
          <div class="form-group">
            <label for="alarm-time">时间</label>
            <input type="time" id="alarm-time" required>
          </div>
          <div class="form-group">
            <label for="alarm-label">标签</label>
            <input type="text" id="alarm-label" placeholder="起床了">
          </div>
          <div class="form-group">
            <label>重复</label>
            <div class="day-selector">
              <button class="day-btn" data-day="0">日</button>
              <button class="day-btn" data-day="1">一</button>
              <button class="day-btn" data-day="2">二</button>
              <button class="day-btn" data-day="3">三</button>
              <button class="day-btn" data-day="4">四</button>
              <button class="day-btn" data-day="5">五</button>
              <button class="day-btn" data-day="6">六</button>
            </div>
          </div>
          <div class="form-actions">
            <button id="cancel-alarm-btn" class="secondary-btn">取消</button>
            <button id="save-alarm-btn" class="primary-btn">保存</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Timers Panel -->
    <div id="timers-panel" class="panel">
      <div class="panel-header">
        <h2>倒计时</h2>
      </div>

      <!-- Quick Presets -->
      <div class="timer-presets">
        <button class="preset-btn" data-minutes="1">1 分钟</button>
        <button class="preset-btn" data-minutes="5">5 分钟</button>
        <button class="preset-btn" data-minutes="10">10 分钟</button>
        <button class="preset-btn" data-minutes="25">25 分钟</button>
      </div>

      <!-- Custom Timer Input -->
      <div class="custom-timer-input">
        <input type="number" id="timer-minutes" placeholder="分钟" min="0" max="999">
        <input type="number" id="timer-seconds" placeholder="秒" min="0" max="59">
        <button id="start-custom-timer-btn" class="primary-btn">开始</button>
      </div>

      <!-- Active Timers List -->
      <div id="active-timers-list" class="timers-list">
        <!-- Active timers will be rendered here -->
      </div>
    </div>

    <!-- Settings Panel -->
    <div id="settings-panel" class="panel">
      <h2>设置</h2>

      <div class="settings-group">
        <div class="setting-item">
          <label for="sound-select">提醒声音</label>
          <select id="sound-select">
            <option value="default.mp3">默认</option>
            <option value="alarm1.mp3">闹钟 1</option>
            <option value="timer.mp3">倒计时</option>
          </select>
        </div>

        <div class="setting-item">
          <label for="volume-slider">音量</label>
          <input type="range" id="volume-slider" min="0" max="100" value="100">
        </div>

        <div class="setting-item">
          <label for="notifications-toggle">启用通知</label>
          <input type="checkbox" id="notifications-toggle" checked>
        </div>

        <div class="setting-item">
          <button id="test-notification-btn" class="secondary-btn">测试通知</button>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
